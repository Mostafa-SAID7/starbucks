# Netlify configuration for Angular Dashboard
[build]
  # Build command for Angular production build
  command = "npm config set registry https://registry.npmjs.org && rm -rf node_modules && npm install --legacy-peer-deps && npm run build:netlify"
  # Directory to publish - relative to base directory (dashboard)
  publish = "dist/dashboard/browser"
  # Set Node.js version
  environment = { NODE_VERSION = "18.20.5" }

# Redirect all routes to index.html for Angular routing (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
