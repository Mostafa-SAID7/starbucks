# Netlify configuration for Angular Dashboard
[build]
  # Build command for Angular production build
  command = "npm install --legacy-peer-deps && npm run build:netlify"
  # Directory to publish (Angular outputs to dist/dashboard/browser for SSR apps)
  publish = "dist/dashboard/browser"
  # Set Node.js version
  environment = { NODE_VERSION = "18.20.5" }

# Redirect all routes to index.html for Angular routing (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Environment variables (override these in Netlify UI)
# These are just placeholders - set actual values in Netlify dashboard
[context.production.environment]
  ANGULAR_ENVIRONMENT = "production"

[context.deploy-preview.environment]
  ANGULAR_ENVIRONMENT = "development"
