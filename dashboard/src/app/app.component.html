@if (isLoginPage) {
  <router-outlet></router-outlet>
} @else {
  <div class="flex h-screen overflow-hidden" style="background: var(--bg-page);" dir="ltr">

    <!-- Mobile overlay -->
    @if (sidebarOpen) {
      <div class="fixed inset-0 z-30 lg:hidden"
        style="background: rgba(12,35,24,0.6); backdrop-filter: blur(2px);"
        (click)="closeSidebar()">
      </div>
    }

    <app-sidebar [isOpen]="sidebarOpen" (closed)="closeSidebar()"></app-sidebar>

    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
      <app-header (menuToggle)="toggleSidebar()"></app-header>
      <main class="flex-1 overflow-y-auto p-4 sm:p-6 animate-fade-in">
        <router-outlet></router-outlet>
      </main>
    </div>

  </div>
}
