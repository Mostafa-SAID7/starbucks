<div class="space-y-6">
  <div class="flex justify-between items-center">
    <h2 class="text-2xl font-bold text-gray-800">Products Management</h2>
    <button class="bg-starbucks-green text-white px-4 py-2 rounded-lg hover:bg-starbucks-dark transition-colors">
      + Add Product
    </button>
  </div>

  <!-- Filters -->
  <div class="bg-white rounded-lg shadow p-4">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <input type="text" placeholder="Search products..." class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-starbucks-green" />
      <select class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-starbucks-green">
        <option>All Categories</option>
        <option>Coffee</option>
        <option>Tea</option>
        <option>Food</option>
        <option>Merchandise</option>
      </select>
      <select class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-starbucks-green">
        <option>All Status</option>
        <option>Active</option>
        <option>Inactive</option>
        <option>Out of Stock</option>
      </select>
      <button class="bg-gray-100 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-200 transition-colors">
        Apply Filters
      </button>
    </div>
  </div>

  <!-- Products Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    @for (product of products; track product.id) {
      <div class="bg-white rounded-lg shadow overflow-hidden hover:shadow-lg transition-shadow">
        <div class="h-48 bg-gray-200 flex items-center justify-center">
          <span class="text-6xl">{{ product.icon }}</span>
        </div>
        <div class="p-4">
          <div class="flex justify-between items-start mb-2">
            <h3 class="text-lg font-semibold text-gray-800">{{ product.name }}</h3>
            <span [class]="getStatusBadgeClass(product.status)" class="px-2 py-1 text-xs font-semibold rounded-full">
              {{ product.status }}
            </span>
          </div>
          <p class="text-sm text-gray-600 mb-2">{{ product.category }}</p>
          <p class="text-sm text-gray-500 mb-4">{{ product.description }}</p>
          <div class="flex justify-between items-center">
            <span class="text-xl font-bold text-starbucks-green">${{ product.price }}</span>
            <span class="text-sm text-gray-500">Stock: {{ product.stock }}</span>
          </div>
          <div class="flex space-x-2 mt-4">
            <button class="flex-1 bg-starbucks-green text-white px-3 py-2 rounded text-sm hover:bg-starbucks-dark transition-colors">
              Edit
            </button>
            <button class="px-3 py-2 border border-gray-300 rounded text-sm hover:bg-gray-50 transition-colors">
              <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    }
  </div>

  <!-- Pagination -->
  <div class="flex justify-between items-center">
    <p class="text-sm text-gray-700">Showing 1 to 12 of 156 products</p>
    <div class="flex space-x-2">
      <button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50">Previous</button>
      <button class="px-3 py-1 bg-starbucks-green text-white rounded">1</button>
      <button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50">2</button>
      <button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50">3</button>
      <button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50">Next</button>
    </div>
  </div>
</div>
