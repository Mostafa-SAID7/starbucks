<div class="space-y-6">
  <div class="flex justify-between items-center">
    <h2 class="text-2xl font-bold text-gray-800">Orders Management</h2>
    <button class="bg-starbucks-green text-white px-4 py-2 rounded-lg hover:bg-starbucks-dark transition-colors">
      + New Order
    </button>
  </div>

  <!-- Filters -->
  <div class="bg-white rounded-lg shadow p-4">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <input type="text" placeholder="Search orders..." class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-starbucks-green" />
      <select class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-starbucks-green">
        <option>All Status</option>
        <option>Pending</option>
        <option>Processing</option>
        <option>Completed</option>
        <option>Cancelled</option>
      </select>
      <input type="date" class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-starbucks-green" />
      <button class="bg-gray-100 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-200 transition-colors">
        Apply Filters
      </button>
    </div>
  </div>

  <!-- Orders Table -->
  <div class="bg-white rounded-lg shadow overflow-hidden">
    <table class="w-full">
      <thead class="bg-gray-50 border-b border-gray-200">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Order ID</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Customer</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Items</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Total</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-200">
        @for (order of orders; track order.id) {
          <tr class="hover:bg-gray-50">
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">#{{ order.id }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ order.customer }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ order.items }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${{ order.total }}</td>
            <td class="px-6 py-4 whitespace-nowrap">
              <span [class]="getStatusClass(order.status)" class="px-2 py-1 text-xs font-semibold rounded-full">
                {{ order.status }}
              </span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ order.date }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
              <button class="text-starbucks-green hover:text-starbucks-dark mr-3">View</button>
              <button class="text-blue-600 hover:text-blue-800 mr-3">Edit</button>
              <button class="text-red-600 hover:text-red-800">Delete</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div class="flex justify-between items-center">
    <p class="text-sm text-gray-700">Showing 1 to 10 of 97 results</p>
    <div class="flex space-x-2">
      <button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50">Previous</button>
      <button class="px-3 py-1 bg-starbucks-green text-white rounded">1</button>
      <button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50">2</button>
      <button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50">3</button>
      <button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50">Next</button>
    </div>
  </div>
</div>
