<header class="bg-white border-b px-4 sm:px-6 flex items-center gap-3 shadow-sm shrink-0 h-[72px]"
  style="border-color: var(--border-subtle);">

  <!-- Mobile menu toggle -->
  <button (click)="toggle()"
    class="lg:hidden btn-icon p-2.5 rounded-xl hover:bg-gray-100 text-gray-600" aria-label="Open menu">
    <lucide-angular name="menu" [size]="20"></lucide-angular>
  </button>

  <!-- Logo mark (mobile only) -->
  <div class="lg:hidden avatar-md avatar-green shadow-sm">
    <lucide-angular name="coffee" [size]="16" class="text-white"></lucide-angular>
  </div>

  <!-- Demo mode badge -->
  @if (auth.isDemoMode()) {
    <div class="hidden sm:flex items-center gap-1.5 px-2.5 py-1.5 bg-amber-50 border border-amber-200 rounded-xl shrink-0">
      <span class="w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse"></span>
      <span class="text-xs font-semibold text-amber-700">Demo Mode</span>
    </div>
  }

  <!-- Search bar -->
  <div class="flex-1 max-w-sm hidden md:block">
    <div class="relative">
      <lucide-angular name="search" [size]="16" class="field-icon"></lucide-angular>
      <input type="text" placeholder="Search orders, products…" class="field-search py-2" />
    </div>
  </div>

  <!-- Right actions -->
  <div class="flex items-center gap-1 ml-auto">

    <button class="md:hidden btn-icon p-2.5 rounded-xl hover:bg-gray-100 text-gray-600">
      <lucide-angular name="search" [size]="18"></lucide-angular>
    </button>

    <button class="relative btn-icon p-2.5 rounded-xl hover:bg-gray-100 text-gray-600 hover:text-gray-800">
      <lucide-angular name="bell" [size]="18"></lucide-angular>
      <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full ring-2 ring-white"></span>
    </button>

    <a routerLink="/settings"
      class="btn-icon p-2.5 rounded-xl hover:bg-gray-100 text-gray-600 hover:text-gray-800">
      <lucide-angular name="settings" [size]="18"></lucide-angular>
    </a>

    <div class="w-px h-6 bg-gray-200 mx-1"></div>

    <div class="flex items-center gap-2.5 pl-1">
      <div class="avatar-md avatar-green shadow-sm">
        <span class="text-xs font-bold text-white">{{ userInitials() }}</span>
      </div>
      <div class="hidden sm:block">
        <p class="text-sm font-semibold text-gray-800 leading-none">{{ auth.user()?.name ?? 'Admin' }}</p>
        <p class="text-[11px] text-gray-500 mt-0.5">{{ auth.user()?.role ?? 'Super Admin' }}</p>
      </div>
    </div>
  </div>
</header>
