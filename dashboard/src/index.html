<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Starbucks Egypt — Admin Dashboard</title>
  <base href="/">

  <!-- SEO (admin → noindex) -->
  <meta name="description" content="Starbucks Egypt admin dashboard — manage orders, products, users, and analytics in real time.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="author" content="Starbucks Egypt">
  <meta name="keywords" content="starbucks egypt admin dashboard">

  <!-- Viewport + PWA core -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#006241">
  <meta name="color-scheme" content="light">

  <!-- Mobile web app -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SBX Admin">
  <meta name="application-name" content="SBX Admin">
  <meta name="msapplication-TileColor" content="#006241">
  <meta name="msapplication-tap-highlight" content="no">

  <!-- Open Graph (admin login page) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Starbucks Egypt Admin Dashboard">
  <meta property="og:description" content="Staff access portal for Starbucks Egypt operations.">
  <meta property="og:image" content="logo.png">

  <!-- Icons + manifest -->
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="manifest" href="manifest.webmanifest">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <app-root></app-root>
</body>
</html>
