name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Frontend: Lint, Type Check, Unit + Integration Tests + Coverage
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-quality:
    name: Frontend Quality (Lint, Type Check, Test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: Frontend

      - name: Run linter
        run: npm run lint
        working-directory: Frontend

      - name: Type check
        run: npm run type-check
        working-directory: Frontend

      - name: Run unit/integration tests with coverage
        run: npm run test:coverage -- --reporter=verbose
        working-directory: Frontend

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./Frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-report
          path: Frontend/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Backend: Build + Unit Tests (fast, no Docker needed)
  # ─────────────────────────────────────────────────────────────────────────────
  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore StarbucksEgypt.slnx
        working-directory: Backend

      - name: Build
        run: dotnet build StarbucksEgypt.slnx --configuration Release --no-restore
        working-directory: Backend

      - name: Run unit tests with coverage
        run: |
          dotnet test src/Starbucks.UnitTests/Starbucks.UnitTests.csproj \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage
        working-directory: Backend

      - name: Upload backend unit test coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: Backend/coverage
          flags: backend-unit
          name: backend-unit-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Backend: Integration Tests with Testcontainers SQL Server
  # Runs only on push to main/develop (not every PR to save CI minutes)
  # ─────────────────────────────────────────────────────────────────────────────
  backend-integration:
    name: Backend Integration Tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: [backend-unit]
    if: github.event_name == 'push' || github.base_ref == 'main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore StarbucksEgypt.slnx
        working-directory: Backend

      - name: Build
        run: dotnet build StarbucksEgypt.slnx --configuration Release --no-restore
        working-directory: Backend

      - name: Run integration tests
        run: |
          dotnet test src/Starbucks.IntegrationTests/Starbucks.IntegrationTests.csproj \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage
        working-directory: Backend
        env:
          DOTNET_ENVIRONMENT: Test

      - name: Upload backend integration coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: Backend/coverage
          flags: backend-integration
          name: backend-integration-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4 — E2E Tests: Playwright (runs after both frontend and backend pass)
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend-quality, backend-unit]
    if: github.event_name == 'push' || github.base_ref == 'main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: Frontend

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: Frontend

      - name: Build frontend for E2E
        run: npm run build
        working-directory: Frontend
        env:
          VITE_API_URL: http://localhost:5000

      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        working-directory: Frontend
        env:
          CI: true
          BASE_URL: http://localhost:5173

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: Frontend/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: Frontend/test-results/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 5 — Docker Build Verification (only on push to main/develop)
  # ─────────────────────────────────────────────────────────────────────────────
  docker-verify:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [frontend-quality, backend-unit]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: Frontend
          file: Frontend/Dockerfile
          push: false
          tags: starbucks-eg-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: Backend
          file: Backend/Dockerfile
          push: false
          tags: starbucks-eg-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
