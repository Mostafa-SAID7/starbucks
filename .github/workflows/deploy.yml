name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Frontend/package-lock.json'
      
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
        if: ${{ secrets.VERCEL_TOKEN != '' }}
      
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: Frontend
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: Frontend
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        env:
          VITE_API_URL: ${{ secrets.PROD_API_URL }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: Frontend
        if: ${{ secrets.VERCEL_TOKEN != '' }}

  deploy-backend:
    name: Deploy Backend (Azure)
    runs-on: ubuntu-latest
    if: ${{ secrets.AZURE_CREDENTIALS != '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
          cache: true
          cache-dependency-path: 'Backend/StarbucksEgypt.slnx'
      
      - name: Install EF Tool
        run: dotnet tool install --global dotnet-ef
      
      - name: Restore dependencies
        run: dotnet restore StarbucksEgypt.slnx
        working-directory: Backend
      
      - name: Create Migration Bundle
        run: |
          dotnet ef migrations bundle --project src/Starbucks.Infrastructure --startup-project src/Starbucks.API --output publish/migrate.exe --self-contained -r win-x64
        working-directory: Backend
        env:
          ASPNETCORE_ENVIRONMENT: Production

      - name: Build and Publish
        run: |
          dotnet build StarbucksEgypt.slnx --configuration Release --no-restore
          dotnet publish StarbucksEgypt.slnx -c Release -o ./publish --no-build
        working-directory: Backend
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: Backend/publish

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-frontend]
    if: always()
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version
        id: version
        run: |
          VERSION=$(node -p "require('./Frontend/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        
      - name: Create Tag
        run: |
          git tag v${{ steps.version.outputs.VERSION }} || true
          git push origin v${{ steps.version.outputs.VERSION }} || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
